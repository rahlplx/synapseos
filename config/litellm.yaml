# LiteLLM — SynapseOS platform routing
# z.ai web app = Rahul's coding tool (separate)
# This config = SynapseOS runtime LLM routing

model_list:
  # Platform default (free Groq tier — 6000 RPM for 8b model)
  - model_name: "fast"
    litellm_params:
      model: "groq/llama-3.1-8b-instant"
      api_key: "os.environ/GROQ_API_KEY"

  # Generation quality (Groq 70b)
  - model_name: "quality"
    litellm_params:
      model: "groq/llama-3.1-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"

  # Fallback 1
  - model_name: "fallback-1"
    litellm_params:
      model: "openrouter/meta-llama/llama-3.1-8b-instruct"
      api_key: "os.environ/OPENROUTER_API_KEY"

  # Fallback 2
  - model_name: "fallback-2"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # BYOK — tenant brings own key, injected dynamically by TenantMiddleware
  # Tenants can use ANY provider: Groq, OpenRouter, Anthropic, z.ai API, etc.

router_settings:
  routing_strategy: "latency-based-routing"
  num_retries: 1
  timeout: 30
  fallbacks:
    - {"quality": ["fallback-1", "fallback-2"]}
    - {"fast": ["fallback-1", "fallback-2"]}

litellm_settings:
  forward_llm_provider_auth_headers: true   # BYOK pass-through
  cache: true
  cache_params:
    type: redis
    host: keydb
    port: 6379
    semantic_cache:
      enabled: true
      embedding_model: "BAAI/bge-base-en-v1.5"
      similarity_threshold: 0.92
