version: "3.9"

x-logging: &logging
  driver: "json-file"
  options: { max-size: "10m", max-file: "3" }

services:
  # ─── Vector Database ───
  qdrant:
    image: qdrant/qdrant:v1.13.5
    restart: unless-stopped
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/var/lib/qdrant/storage
      - ./config/qdrant.yaml:/qdrant/config/production.yaml
    environment:
      - QDRANT__STORAGE__PERFORMANCE__ASYNC_SCORER=true
      - QDRANT__STORAGE__STORAGE_PATH=/var/lib/qdrant/storage
      - QDRANT__LOG_LEVEL=WARN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: { cpus: "1.0", memory: "4G" }
        reservations: { memory: "1G" }
    logging: *logging

  # ─── Relational Database ───
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=synapseos
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapseos"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "2G" }
    logging: *logging

  # ─── Cache + Queue + Rate Limit ───
  keydb:
    image: eqalpha/keydb:latest
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - keydb_data:/data
      - ./config/keydb.conf:/etc/keydb/keydb.conf
    command: keydb-server /etc/keydb/keydb.conf
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "1.5G" }
    logging: *logging

  # ─── Object Storage ───
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports: ["9000:9000", "9001:9001"]
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes: [minio_data:/data]
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "1G" }
    logging: *logging

  # ─── LiteLLM Proxy ───
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports: ["4000:4000"]
    volumes: ["./config/litellm.yaml:/app/config.yaml"]
    environment:
      - REDIS_URL=redis://keydb:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: --config /app/config.yaml --port 4000
    depends_on:
      keydb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "512M" }
    logging: *logging

  # ─── FastAPI Backend ───
  api:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    ports: ["8000:8000"]
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      keydb:
        condition: service_healthy
      minio:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "3.0", memory: "6G" }
        reservations: { cpus: "0.5", memory: "1.5G" }
    logging: *logging

  # ─── Ingestion Worker (concurrency=1 for Docling ARM safety) ───
  worker:
    build: { context: ., dockerfile: Dockerfile.worker }
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      keydb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "1.0", memory: "4.5G" }
    logging: *logging

  # ─── MCP Server ───
  mcp:
    build: { context: ., dockerfile: Dockerfile.mcp }
    restart: unless-stopped
    ports: ["8095:8095"]
    environment:
      - SYNAPSE_BASE_URL=http://api:8000
      - SYNAPSE_API_KEY=${MCP_SERVICE_KEY}
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "0.2", memory: "256M" }
    logging: *logging

  # ─── Observability ───
  langfuse:
    image: langfuse/langfuse:3
    restart: unless-stopped
    ports: ["3100:3000"]
    environment:
      - DATABASE_URL=postgresql://synapse:${POSTGRES_PASSWORD}@postgres:5432/synapseos
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - SALT=${LANGFUSE_SALT}
      - NEXTAUTH_URL=http://localhost:3100
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "2.5G" }
    logging: *logging

volumes:
  qdrant_data:
  pg_data:
  keydb_data:
  minio_data:
